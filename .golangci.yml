run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - prealloc

linters-settings:
  gocritic:
    enabled-checks:
      - appendAssign
      - dupBranchBody
      - dupCase
      - elseif
      - sloppyLen
  errcheck:
    check-blank: true
  govet:
    shadow: false
  misspell:
    locale: US

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
    - path: cmd/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 5
